<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Hangzhou InnoCap Specialty Materials Ltd.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #000; --accent: #0071e3; --text-sub: #86868b; --glass: rgba(255,255,255,0.75); --transition: all 0.4s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--primary); background: #fff; line-height: 1.5; }

        nav { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; padding: 10px 24px; background: var(--glass); backdrop-filter: blur(20px); z-index: 1000; border-radius: 40px; border: 1px solid rgba(0,0,0,0.05); }
        .logo-container img { height: 28px; }
        .nav-links { display: flex; list-style: none; gap: 32px; }
        #lang-btn { background: var(--primary); color: white; border: none; padding: 7px 18px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }

        .contact-header { padding: 160px 10% 60px; text-align: center; }
        .contact-header h1 { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700; margin-bottom: 15px; }

        .section { padding: 40px 10% 100px; }
        .contact-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 60px; max-width: 1100px; margin: 0 auto; }
        .info-item { margin-bottom: 30px; }
        .info-item i { font-size: 1.5rem; color: var(--accent); margin-bottom: 10px; display: block; }

        .form-container { background: #fff; padding: 40px; border-radius: 24px; border: 1px solid #f2f2f2; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px; border: 1px solid #e5e5e7; border-radius: 12px; font-family: inherit; font-size: 1rem; }

        .submit-btn { width: 100%; background: var(--primary); color: #fff; padding: 16px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .submit-btn:hover { background: var(--accent); }

        footer { padding: 60px 10%; text-align: center; color: var(--text-sub); font-size: 0.8rem; border-top: 1px solid #f2f2f2; }

        @media (max-width: 768px) {
            nav { width: 95%; top: 12px; }
            .nav-links { display: none; }
            .contact-grid { grid-template-columns: 1fr; gap: 40px; }
            .form-container { padding: 25px; }
            .contact-header { padding-top: 120px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo-container"><a href="index.html"><img src="logo.png" alt="Logo"></a></div>
        <ul class="nav-links">
            <li><a href="index.html" data-i18n="nav_home">Home</a></li>
            <li><a href="about.html" data-i18n="nav_about">About Us</a></li>
            <li><a href="products.html" data-i18n="nav_products">Products</a></li>
            <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
        </ul>
        <button id="lang-btn">中文</button>
    </nav>
    <header class="contact-header">
        <h1 data-i18n="contact_h1">Connect With Us</h1>
        <p data-i18n="contact_sub">Specialized material solutions for your project.</p>
    </header>
    <section class="section">
        <div class="contact-grid">
            <div class="contact-info">
                <div class="info-item"><i class="fa-solid fa-envelope"></i><h3 data-i18n="info_mail">Email</h3><p>contact@innocap.com</p></div>
                <div class="info-item"><i class="fa-solid fa-phone"></i><h3 data-i18n="info_phone">Phone</h3><p>+86 571 1234 5678</p></div>
            </div>
            <div class="form-container">
                <form action="https://formspree.io/f/xzdypozv" method="POST">
                    <div class="form-group"><label data-i18n="form_name">Name</label><input type="text" name="name" required></div>
                    <div class="form-group"><label data-i18n="form_email">Email</label><input type="email" name="email" required></div>
                    <div class="form-group">
                        <label data-i18n="form_service">Interest Area</label>
                        <select name="interest">
                            <option value="Textiles" data-i18n="opt_1">Textiles</option>
                            <option value="Electronics" data-i18n="opt_2">Electronics</option>
                            <option value="General" data-i18n="opt_general">General Inquiry</option>
                        </select>
                    </div>
                    <div class="form-group"><label data-i18n="form_msg">Message</label><textarea name="message" rows="4"></textarea></div>
                    <button type="submit" class="submit-btn" data-i18n="form_submit">Submit</button>
                </form>
            </div>
        </div>
    </section>
    <footer><p>© 2026 Hangzhou InnoCap Specialty Materials Ltd. ALL RIGHTS RESERVED.</p></footer>
    <script>
        const translations = {
            en: { nav_home: "Home", contact_h1: "Connect With Us", contact_sub: "Specialized solutions.", info_mail: "Email", info_phone: "Phone", form_name: "Name", form_email: "Email", form_service: "Interest", form_msg: "Message", form_submit: "Submit", opt_1: "Textiles", opt_2: "Electronics", opt_general: "General", btn: "中文" },
            zh: { nav_home: "首页", contact_h1: "联系我们", contact_sub: "为您提供定制化材料解决方案。", info_mail: "业务邮箱", info_phone: "联系电话", form_name: "姓名", form_email: "邮箱", form_service: "意向领域", form_msg: "留言", form_submit: "提交", opt_1: "纺织类", opt_2: "电子类", opt_general: "一般咨询", btn: "English" }
        };
        let currentLang = 'en';
        const langBtn = document.getElementById('lang-btn');
        langBtn.addEventListener('click', () => { currentLang = currentLang === 'en' ? 'zh' : 'en'; updateLanguage(); });
        function updateLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                const key = el.getAttribute('data-i18n');
                if(el.tagName === "OPTION") el.text = translations[currentLang][key];
                else el.textContent = translations[currentLang][key];
            });
            langBtn.textContent = translations[currentLang].btn;
        }
    </script>
</body>
</html>
